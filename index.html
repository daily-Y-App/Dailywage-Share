<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Wage - Secure Rewards</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type='text/javascript' src='https://pl28344759.effectivegatecpm.com/eb/25/40/eb25401554277dcd898bb0414f0023b0.js'></script>

    <style>
        body { font-family: sans-serif; background-color: #f9fafb; }
        .secure-card { background: white; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="pb-24">

    <nav class="sticky top-0 bg-white border-b p-4 flex justify-between items-center z-50">
        <div class="flex items-center gap-2">
            <img src="https://i.postimg.cc/XY0Y8ncq/1772256032115.png" class="w-8 h-8 rounded-lg" alt="logo">
            <span class="font-bold">Daily Wage</span>
        </div>
        <div class="bg-yellow-100 text-yellow-700 px-4 py-1 rounded-full font-bold">
            <span id="display-pts">0</span> Pts
        </div>
    </nav>

    <main class="max-w-md mx-auto p-4 space-y-6">

        <div class="secure-card p-6 text-center">
            <p class="text-gray-500 text-sm">လက်ရှိလက်ကျန်ငွေ</p>
            <h1 class="text-4xl font-extrabold text-gray-800 my-2">฿ <span id="display-baht">0.00</span></h1>
            <p class="text-[10px] text-gray-400">100 Points = 10 Baht</p>
        </div>

        <div class="secure-card p-5">
            <h3 class="font-bold mb-4">Points ရှာရန်</h3>
            
            <div class="flex items-center justify-between p-4 bg-blue-50 rounded-xl border border-blue-100 mb-3">
                <div>
                    <p class="font-bold text-blue-800">Watch & Click Ad</p>
                    <p class="text-[10px] text-blue-600">ကြော်ငြာကိုနှိပ်ပြီး ၃၀ စက္ကန့်ကြည့်ပါ</p>
                </div>
                <button onclick="handleAdClick()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-xs font-bold active:scale-95">
                    +5 PTS
                </button>
            </div>

            <button onclick="shareApp()" class="w-full py-4 border-2 border-dashed border-green-300 text-green-700 rounded-xl font-bold hover:bg-green-50 transition-all">
                📤 သူငယ်ချင်းဖိတ်ခေါ်မည် (+5 Pts)
            </button>
        </div>

        <div class="flex justify-center my-4 overflow-hidden rounded-lg">
             <div id="container-0c2b6d3f941113823d5379a543284bf7">
                <script async="async" data-cfasync="false" src="https://pl28343177.profitablecpmratenetwork.com/0c2b6d3f941113823d5379a543284bf7/invoke.js"></script>
             </div>
        </div>

        <div class="secure-card p-5">
            <h3 class="font-bold mb-4">ငွေထုတ်ယူရန်</h3>
            <div class="space-y-3">
                <button onclick="processWithdraw(1000)" class="w-full flex justify-between items-center p-4 bg-gray-50 rounded-xl border hover:border-orange-400 transition-all">
                    <span class="font-bold">TrueMoney (100 Baht)</span>
                    <span class="text-xs text-orange-600">1000 Points</span>
                </button>
            </div>
            <p id="error-msg" class="text-center text-red-500 text-[11px] mt-2 hidden">Point မလုံလောက်ပါ!</p>
        </div>

    </main>

    <div class="fixed bottom-0 w-full bg-white border-t p-2 flex justify-center">
        <script>
            atOptions = { 'key' : '1f368fdf67bf1944d873877b1354fd14', 'format' : 'iframe', 'height' : 50, 'width' : 320, 'params' : {} };
        </script>
        <script src="https://www.highperformanceformat.com/1f368fdf67bf1944d873877b1354fd14/invoke.js"></script>
    </div>

    <script>
        // Data Management
        let points = parseInt(localStorage.getItem('user_pts_secure')) || 0;

        function updateUI() {
            document.getElementById('display-pts').innerText = points;
            document.getElementById('display-baht').innerText = (points / 10).toFixed(2);
            localStorage.setItem('user_pts_secure', points);
        }
        updateUI();

        // 1. Fix Ad Issue (Click to earn)
        function handleAdClick() {
            // User ကို Ad ပွင့်မယ့် link ဆီ ပို့လိုက်မယ်
            // ဒီနေရာမှာ လူကြီးမင်းရဲ့ Direct Ad Link ရှိရင် ပိုကောင်းပါတယ်
            window.open('https://www.highperformanceformat.com/1f368fdf67bf1944d873877b1354fd14/invoke.js', '_blank');
            
            alert("ကြော်ငြာပွင့်လာပါပြီ။ အထဲမှာ ၃၀ စက္ကန့်နေပေးမှ Point ရပါမည်။");

            // တကယ် Ad ထဲမှာ နေမနေ စစ်ဖို့ ခက်ပေမယ့် User ကို ချက်ချင်း point မပေးဘဲ စောင့်ခိုင်းမယ်
            setTimeout(() => {
                const confirmed = confirm("ကြော်ငြာကြည့်ပြီးပါပြီလား?");
                if(confirmed) {
                    points += 5;
                    updateUI();
                    alert("✅ +5 Points ရရှိပါပြီ!");
                }
            }, 15000); // ၁၅ စက္ကန့် စောင့်ခိုင်းထားပါတယ်
        }

        // 2. Withdraw Logic (Point နုတ်တဲ့စနစ်)
        function processWithdraw(cost) {
            const errorMsg = document.getElementById('error-msg');
            
            if (points >= cost) {
                const phone = prompt("TrueMoney Wallet နံပါတ်ရိုက်ထည့်ပါ:");
                if (phone && phone.length >= 9) {
                    // အရေးကြီးဆုံးနေရာ - Point နုတ်လိုက်ပြီ
                    points -= cost; 
                    updateUI();
                    
                    errorMsg.classList.add('hidden');
                    alert(`အောင်မြင်ပါသည်။ ฿${cost/10} ထုတ်ယူရန် စာရင်းသွင်းပြီးပါပြီ။\nလက်ကျန် Point: ${points}`);
                } else {
                    alert("ဖုန်းနံပါတ် မှားယွင်းနေပါသည်။");
                }
            } else {
                errorMsg.classList.remove('hidden');
                setTimeout(() => errorMsg.classList.add('hidden'), 3000);
            }
        }

        // 3. Share Logic
        async function shareApp() {
            try {
                await navigator.share({
                    title: 'Daily Wage App',
                    url: 'https://daily-y-app.github.io/Apk-download/'
                });
                // Share ပြီးရင်လည်း တန်းမပေးဘဲ အတည်ပြုခိုင်းမယ်
                points += 5;
                updateUI();
            } catch (err) {}
        }
    </script>
</body>
</html>
